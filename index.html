    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: radial-gradient(circle at center, #1a0812 0%, #0c0408 50%, #030102 100%); 
            background-color: #030102; 
            font-family: 'Montserrat', sans-serif; 
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none;
            color: #fff;
        }

        #canvas-container { 
            width: 100vw; 
            height: 100vh; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1; 
            cursor: grab; 
        }
        #canvas-container:active { cursor: grabbing; }

        /* UI Overlay */
        #ui-layer {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            z-index: 10; 
            pointer-events: none;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: space-between;
            padding: 40px 20px;
            box-sizing: border-box;
            transition: opacity 0.5s ease;
        }
        
        .ui-hidden { opacity: 0 !important; pointer-events: none !important; }

        /* Loader */
        #loader {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: #030102; 
            z-index: 100;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            transition: opacity 0.8s ease-out;
        }
        .loader-text {
            color: #ff758c; 
            font-size: 16px; 
            letter-spacing: 4px; 
            margin-top: 25px;
            text-transform: uppercase; 
            font-weight: 500;
            font-family: 'Cinzel', serif;
            animation: pulse 2s infinite;
        }
        .spinner {
            width: 50px; 
            height: 50px; 
            border: 2px solid rgba(255, 117, 140, 0.1); 
            border-top: 2px solid #ff758c; 
            border-radius: 50%; 
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        /* Header Title */
        .header-title-container {
            text-align: center;
            pointer-events: none;
            margin-top: 10px;
        }
        h1 { 
            color: #ffb3c1; 
            font-size: 7vw; 
            margin: 0; 
            font-weight: 700; 
            letter-spacing: 6px; 
            text-shadow: 0 0 30px rgba(255, 117, 140, 0.5); 
            background: linear-gradient(to bottom, #ffffff 0%, #ffb3c1 50%, #ff4d6d 100%);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            font-family: 'Cinzel', serif;
            opacity: 0.95; 
            transition: opacity 0.5s ease;
        }
        .sub-title {
            font-family: 'Dancing Script', cursive;
            font-size: 5vw;
            color: #ff758c;
            margin-top: 5px;
            text-shadow: 0 0 10px rgba(255, 117, 140, 0.4);
        }
        @media (min-width: 768px) { 
            h1 { font-size: 48px; } 
            .sub-title { font-size: 28px; }
        }

        /* Controls Panel */
        .controls-wrapper {
            position: absolute; 
            top: 40px; 
            right: 20px;        
            pointer-events: auto;
            display: flex; 
            flex-direction: column; 
            align-items: flex-end;
            gap: 12px; 
            z-index: 20;
            transition: opacity 0.5s ease;
        }
        .btn-group {
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            align-items: flex-end;
        }
        .control-btn {
            background: rgba(20, 10, 15, 0.6); 
            border: 1px solid rgba(255, 117, 140, 0.4); 
            color: #ffb3c1; 
            padding: 10px 18px; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 10px;
            font-weight: 600;
            border-radius: 30px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(8px); 
            min-width: 140px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .control-btn.active {
            background: #ff758c; 
            color: #1a0812;
            box-shadow: 0 0 20px rgba(255, 117, 140, 0.6);
            border-color: #ff758c;
        }
        .control-btn:hover { 
            background: #ff758c; 
            color: #1a0812; 
            box-shadow: 0 0 25px rgba(255, 117, 140, 0.6);
            transform: translateY(-2px);
        }
        .hint-text {
            color: rgba(255, 179, 193, 0.7); 
            font-size: 9px;
            letter-spacing: 1px; 
            text-transform: uppercase;
            text-align: right; 
            margin-top: 5px; 
            max-width: 240px;
            line-height: 1.5;
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 8px;
        }

        input[type="file"] { display: none; }

        /* Floating Audio Control */
        .music-controller {
            position: absolute;
            top: 40px;
            left: 20px;
            z-index: 25;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .music-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(20, 10, 15, 0.6);
            border: 1px solid rgba(255, 117, 140, 0.4);
            color: #ffb3c1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .music-btn:hover {
            transform: scale(1.1);
            border-color: #ff758c;
            box-shadow: 0 0 15px rgba(255, 117, 140, 0.5);
        }
        .music-btn.playing i {
            animation: rotateDisk 4s linear infinite;
        }
        @keyframes rotateDisk { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Bottom Mode Bar */
        #mode-bar {
            position: absolute; 
            bottom: 40px; 
            left: 50%;
            transform: translateX(-50%);
            display: flex; 
            gap: 20px;
            z-index: 20; 
            pointer-events: auto;
        }
        .mode-btn {
            width: 55px; 
            height: 55px; 
            border-radius: 50%;
            background: rgba(20, 10, 15, 0.7);
            border: 1px solid rgba(255, 117, 140, 0.5);
            color: #ffb3c1; 
            font-size: 22px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(8px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        .mode-btn:hover {
            transform: scale(1.15) translateY(-5px);
            border-color: #ff758c;
            box-shadow: 0 0 25px rgba(255, 117, 140, 0.5);
        }
        .mode-btn:active { 
            transform: scale(0.9); 
        }
        .mode-btn.active {
            background: #ff758c;
            color: #1a0812;
            border-color: #ff758c;
            box-shadow: 0 0 25px rgba(255, 117, 140, 0.6);
        }
        
        /* Webcam feedback */
        #webcam-wrapper {
            position: absolute; 
            bottom: 40px; 
            left: 20px;         
            width: 140px; 
            height: 105px;
            border: 2px solid rgba(255, 117, 140, 0.5); 
            box-shadow: 0 8px 30px rgba(0,0,0,0.8);
            border-radius: 8px; 
            overflow: hidden; 
            opacity: 0; 
            pointer-events: none;
            z-index: 50; 
            background: #000;
            transition: opacity 0.5s ease, transform 0.5s ease;
            transform: translateY(20px);
        }
        #webcam-wrapper.active {
            opacity: 1;
            transform: translateY(0);
        }
        #webcam { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
        }

        #debug-info {
            position: absolute; 
            bottom: 15px; 
            left: 0;
            width: 100%;
            color: rgba(255, 179, 193, 0.85); 
            font-size: 11px;
            font-family: monospace; 
            pointer-events: none; 
            z-index: 51;
            text-align: center;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        
        #msg-box {
            position: absolute; 
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 5, 10, 0.9);
            border: 1px solid #ff758c;
            padding: 22px 35px; 
            color: #ffb3c1;
            z-index: 200; 
            text-align: center;
            display: none; 
            border-radius: 12px; 
            min-width: 250px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            font-weight: 500;
        }

        /* Ambient background glow elements */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 117, 140, 0.08) 0%, rgba(26, 8, 16, 0.05) 50%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }
    </style>

        // --- Core Configuration ---
        const CONFIG = {

        const STATE = {

        let scene, camera, renderer, composer;

        // Global mode switcher
        window.setMode = (mode) => {
            // Update active state class on mode buttons
            document.querySelectorAll('#mode-bar .mode-btn').forEach(btn => btn.classList.remove('active'));
            if (mode === 'TREE') document.getElementById('btn-tree').classList.add('active');
            else if (mode === 'SCATTER') document.getElementById('btn-scatter').classList.add('active');
            
            if (mode === 'FOCUS_RANDOM') {
                document.getElementById('btn-focus').classList.add('active');
                STATE.mode = 'FOCUS';
                const photos = particleSystem.filter(p => p.type === 'PHOTO');
                if (photos.length) {
                    STATE.focusTarget = photos[Math.floor(Math.random() * photos.length)].mesh;
                    debugInfo.innerText = "Đang tập trung vào một kỉ niệm ngẫu nhiên";
                } else {
                    showMsg("Chưa có ảnh nào được tải!");
                    window.setMode('TREE');
                }
            } else {
                STATE.mode = mode;
                if (mode === 'TREE') {
                    STATE.focusTarget = null;
                    debugInfo.innerText = "Kéo thả để xoay • Click vào ảnh để phóng to";
                } else if (mode === 'SCATTER') {
                    STATE.focusTarget = null;
                    debugInfo.innerText = "Chế độ tản ra các vì sao tình yêu";
                }
            }
        };

        async function init() {
            initThree();
            setupEnvironment(); 
            setupLights();
            createParticles(); 
            createDust();
            createSnow();
            await loadPredefinedImages();
            setupPostProcessing();
            setupEvents();
            setupTouchAndClick();
            setupAudio();
            
            const loader = document.getElementById('loader');
            loader.style.opacity = 0;
            setTimeout(() => loader.remove(), 800);

            animate();
        }

        function setupTouchAndClick() {
            const container = document.getElementById('canvas-container');
            
            container.addEventListener('pointerdown', (e) => {
                STATE.touch.active = true;
                STATE.touch.startX = e.clientX;
                STATE.touch.startY = e.clientY;
                STATE.touch.lastX = e.clientX;
                STATE.touch.lastY = e.clientY;
            });

            window.addEventListener('pointermove', (e) => {
                if (!STATE.touch.active) return;
                const deltaX = e.clientX - STATE.touch.lastX;
                const deltaY = e.clientY - STATE.touch.lastY;
                STATE.rotation.y += deltaX * 0.005;
                STATE.rotation.x += deltaY * 0.002;
                STATE.rotation.x = Math.max(-0.5, Math.min(0.5, STATE.rotation.x));
                STATE.touch.lastX = e.clientX;
                STATE.touch.lastY = e.clientY;
            });

            window.addEventListener('pointerup', (e) => {
                STATE.touch.active = false;
            });

            container.addEventListener('click', (e) => {
                const moveDist = Math.hypot(e.clientX - STATE.touch.startX, e.clientY - STATE.touch.startY);
                if (moveDist > 8) return; // Ignore drag clicks
                
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                
                const intersects = raycaster.intersectObjects(photoMeshGroup.children, true);
                
                let clickedPhoto = null;
                for (let hit of intersects) {
                    let obj = hit.object;
                    // Traverse up to find the main photo group
                    while (obj.parent && obj.parent !== photoMeshGroup) {
                        obj = obj.parent;
                    }
                    const particle = particleSystem.find(p => p.mesh === obj && p.type === 'PHOTO');
                    if (particle) { clickedPhoto = particle; break; }
                }
                
                if (clickedPhoto) {
                    STATE.mode = 'FOCUS';
                    STATE.focusTarget = clickedPhoto.mesh;
                    document.querySelectorAll('#mode-bar .mode-btn').forEach(btn => btn.classList.remove('active'));
                    document.getElementById('btn-focus').classList.add('active');
                    debugInfo.innerText = "Đang xem ảnh kỉ niệm • Click ra ngoài để quay lại";
                } else {
                    if (STATE.mode === 'FOCUS') {
                        window.setMode('TREE');
                    }
                }
            });

            // Double tap to scatter/gather
            let lastTap = 0;
            container.addEventListener('touchend', (e) => {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTap;
                if (tapLength < 300 && tapLength > 0) {
                    if (STATE.mode === 'SCATTER') window.setMode('TREE');
                    else window.setMode('SCATTER');
                    e.preventDefault();
                }
                lastTap = currentTime;
            });
        }

        function createSnow() {
            const geometry = new THREE.BufferGeometry();
            const vertices = []; 
            const velocities = [];
            
            // Create soft pinkish circular snow texture
            const canvas = document.createElement('canvas');
            canvas.width = 16; 
            canvas.height = 16;
            const context = canvas.getContext('2d');
            const grad = context.createRadialGradient(8, 8, 0, 8, 8, 8);
            grad.addColorStop(0, 'rgba(255, 182, 193, 1)');
            grad.addColorStop(1, 'rgba(255, 182, 193, 0)');
            context.fillStyle = grad; 
            context.fillRect(0, 0, 16, 16);
            const snowTexture = new THREE.CanvasTexture(canvas);
            
            for (let i = 0; i < CONFIG.particles.snowCount; i++) {
                vertices.push(
                    THREE.MathUtils.randFloatSpread(90), 
                    THREE.MathUtils.randFloatSpread(50), 
                    THREE.MathUtils.randFloatSpread(50)
                );
                velocities.push(Math.random() * 0.12 + 0.04, Math.random() * 0.05);
            }
            
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.setAttribute('userData', new THREE.Float32BufferAttribute(velocities, 2));
            
            const material = new THREE.PointsMaterial({
                color: 0xffe6eb, 
                size: 0.5, 
                map: snowTexture, 
                transparent: true, 
                opacity: 0.8, 
                blending: THREE.AdditiveBlending, 
                depthWrite: false
            });
            
            snowSystem = new THREE.Points(geometry, material);
            scene.add(snowSystem);
        }

        function updateSnow() {
            if (!snowSystem) return;
            const positions = snowSystem.geometry.attributes.position.array;
            const userData = snowSystem.geometry.attributes.userData.array;
            const time = clock.getElapsedTime();
            for (let i = 0; i < CONFIG.particles.snowCount; i++) {
                const fallSpeed = userData[i * 2];
                positions[i * 3 + 1] -= fallSpeed; // Y velocity
                
                const swaySpeed = userData[i * 2 + 1];
                positions[i * 3] += Math.sin(time * 1.2 + i) * swaySpeed * 0.08; // X sway
                
                if (positions[i * 3 + 1] < -25) {
                    positions[i * 3 + 1] = 25;
                    positions[i * 3] = THREE.MathUtils.randFloatSpread(90);
                    positions[i * 3 + 2] = THREE.MathUtils.randFloatSpread(50);
                }
            }
            snowSystem.geometry.attributes.position.needsUpdate = true;
        }

        class Particle {
            constructor(mesh, type, isDust = false) {
                this.mesh = mesh; 
                this.type = type; 
                this.isDust = isDust;
                this.posTree = new THREE.Vector3(); // posTree holds the Heart shape layout
                this.posScatter = new THREE.Vector3();
                this.baseScale = mesh.scale.x; 
                const speedMult = (type === 'PHOTO') ? 0.35 : 1.8;
                this.spinSpeed = new THREE.Vector3(
                    (Math.random() - 0.5) * speedMult, 
                    (Math.random() - 0.5) * speedMult, 
                    (Math.random() - 0.5) * speedMult
                );
                this.calculatePositions();
            }

            calculatePositions() {
                if (this.type === 'PHOTO') {
                    this.posTree.set(0, 0, 0); 
                    const rScatter = 12 + Math.random() * 14;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    this.posScatter.set(
                        rScatter * Math.sin(phi) * Math.cos(theta), 
                        rScatter * Math.sin(phi) * Math.sin(theta), 
                        rScatter * Math.cos(phi)
                    );
                    return;
                }
                
                // --- Volumetric 3D Parametric Heart ---
                const theta = Math.random() * Math.PI * 2;
                const phi = (Math.random() - 0.5) * Math.PI; // -pi/2 to pi/2

                // 2D Heart Outline values
                const xBase = 16 * Math.pow(Math.sin(theta), 3);
                const yBase = 13 * Math.cos(theta) - 5 * Math.cos(2 * theta) - 2 * Math.cos(3 * theta) - Math.cos(4 * theta) + 5;

                // Stretch out to 3D sphere rotation around heart axis
                const x = xBase * Math.cos(phi) * 0.75;
                const y = yBase * 0.75;
                const z = xBase * Math.sin(phi) * 0.38; // flatter in Z to match human heart shape

                const scale = 0.95;
                const r = 0.82 + Math.random() * 0.38; // Volumetric thickness variation

                this.posTree.set(x * scale * r, y * scale * r, z * scale * r);
                
                let rScatter = this.isDust ? (14 + Math.random() * 18) : (8 + Math.random() * 14);
                const tScatter = Math.random() * Math.PI * 2;
                const pScatter = Math.acos(2 * Math.random() - 1);
                this.posScatter.set(
                    rScatter * Math.sin(pScatter) * Math.cos(tScatter), 
                    rScatter * Math.sin(pScatter) * Math.sin(tScatter), 
                    rScatter * Math.cos(pScatter)
                );
            }

            update(dt, mode, focusTargetMesh) {
                let target = (mode === 'SCATTER') ? this.posScatter : this.posTree;
                if (mode === 'FOCUS') {
                    if (this.mesh === focusTargetMesh) {
                        const desiredWorldPos = new THREE.Vector3(0, 0, 26);
                        const invMatrix = new THREE.Matrix4().copy(mainGroup.matrixWorld).invert();
                        target = desiredWorldPos.applyMatrix4(invMatrix);
                    } else {
                        target = this.posScatter;
                    }
                }
                
                const lerpSpeed = (mode === 'FOCUS' && this.mesh === focusTargetMesh) ? 5.5 : 2.2; 
                this.mesh.position.lerp(target, lerpSpeed * dt);
                
                if (mode === 'SCATTER') {
                    this.mesh.rotation.x += this.spinSpeed.x * dt;
                    this.mesh.rotation.y += this.spinSpeed.y * dt;
                    this.mesh.rotation.z += this.spinSpeed.z * dt; 
                } else if (mode === 'TREE') {
                    if (this.type === 'PHOTO') {
                        // Face outwards from the center of the heart
                        this.mesh.lookAt(0, this.mesh.position.y, 0);
                        this.mesh.rotateY(Math.PI);
                    } else {
                        this.mesh.rotation.x = THREE.MathUtils.lerp(this.mesh.rotation.x, 0, dt * 2);
                        this.mesh.rotation.z = THREE.MathUtils.lerp(this.mesh.rotation.z, 0, dt * 2);
                        this.mesh.rotation.y += 0.45 * dt; 
                    }
                }
                
                if (mode === 'FOCUS' && this.mesh === focusTargetMesh) {
                    // Smoothly rotate to look at local camera position (rotates with the heart in 3D)
                    const tempObj = new THREE.Object3D();
                    tempObj.position.copy(this.mesh.position);
                    tempObj.lookAt(camera.position);
                    this.mesh.quaternion.slerp(tempObj.quaternion, dt * 5.0);
                }
                
                let s = this.baseScale;
                if (this.isDust) {
                    s = this.baseScale * (0.85 + 0.35 * Math.sin(clock.elapsedTime * 3.5 + this.mesh.id));
                    if (mode === 'TREE') s = 0; // Hide dust in heart mode
                } else if (mode === 'SCATTER' && this.type === 'PHOTO') {
                    s = this.baseScale * 1.5; 
                } else if (mode === 'FOCUS') {
                    if (this.mesh === focusTargetMesh) s = 3.3; 
                    else s = this.baseScale * 0.4; // shrink others
                }
                
                this.mesh.scale.lerp(new THREE.Vector3(s, s, s), 4.5 * dt);
            }
        }

        function updatePhotoLayout() {
            const photos = particleSystem.filter(p => p.type === 'PHOTO');
            const count = photos.length;
            if (count === 0) return;
            
            // Position photos in a golden-ratio spiral wrap around the outer perimeter of the 3D heart
            photos.forEach((p, i) => {
                // Theta wraps around 2pi
                const theta = (i / count) * Math.PI * 2 + (Math.PI / 6);
                const phi = Math.sin(i * 3.1) * 0.35; // slightly offset in latitude

                const xBase = 16 * Math.pow(Math.sin(theta), 3);
                const yBase = 13 * Math.cos(theta) - 5 * Math.cos(2 * theta) - 2 * Math.cos(3 * theta) - Math.cos(4 * theta) + 5;

                const x = xBase * Math.cos(phi) * 0.75;
                const y = yBase * 0.75;
                const z = xBase * Math.sin(phi) * 0.38;

                const r = 1.25; // floating slightly outside the heart shell
                p.posTree.set(x * r * 0.95, y * r * 0.95, z * r * 0.95);
            });
        }

        function createParticles() {
            const sphereGeo = new THREE.SphereGeometry(0.38, 16, 16); 
            
            // Build custom 3D Heart Geometry
            const heartShape = new THREE.Shape();
            heartShape.moveTo(0, 0);
            heartShape.bezierCurveTo(-0.75, 0.75, -1.5, 0, -1.5, -1.0);
            heartShape.bezierCurveTo(-1.5, -2.25, -0.5, -3.25, 0, -4.0);
            heartShape.bezierCurveTo(0.5, -3.25, 1.5, -2.25, 1.5, -1.0);
            heartShape.bezierCurveTo(1.5, 0, 0.75, 0.75, 0, 0);
            
            const heartGeo = new THREE.ExtrudeGeometry(heartShape, { 
                depth: 0.2, 
                bevelEnabled: true, 
                bevelThickness: 0.08, 
                bevelSize: 0.06, 
                bevelSegments: 2 
            });
            heartGeo.center();
            heartGeo.scale(0.18, 0.18, 0.18); // scale down to match particles
            
            // Romantic love materials
            const pinkMat = new THREE.MeshStandardMaterial({ 
                color: CONFIG.colors.pink, 
                metalness: 0.2, 
                roughness: 0.4, 
                emissive: 0x3a0f18, 
                emissiveIntensity: 0.35 
            });
            const redMat = new THREE.MeshPhysicalMaterial({ 
                color: CONFIG.colors.accentRed, 
                metalness: 0.15, 
                roughness: 0.12, 
                clearcoat: 1.0, 
                emissive: 0x440011,
                emissiveIntensity: 0.2
            });
            const roseGoldMat = new THREE.MeshStandardMaterial({ 
                color: CONFIG.colors.roseGold, 
                metalness: 0.9, 
                roughness: 0.15, 
                envMapIntensity: 2.5, 
                emissive: 0x3d2b2d, 
                emissiveIntensity: 0.3 
            });

            for (let i = 0; i < CONFIG.particles.count; i++) {
                const rand = Math.random();

                } else {

                    type = 'PINK_SPHERE'; 
                }
                
                const s = 0.5 + Math.random() * 0.5;
                mesh.scale.set(s, s, s); 
                mesh.rotation.set(Math.random() * 6.2, Math.random() * 6.2, Math.random() * 6.2);
                mainGroup.add(mesh);
                particleSystem.push(new Particle(mesh, type, false));

            // Glowing Heart on top of the heart structure
            const topHeartGeo = new THREE.ExtrudeGeometry(heartShape, { 
                depth: 0.35, 
                bevelEnabled: true, 
                bevelThickness: 0.1, 
                bevelSize: 0.08, 
                bevelSegments: 3

            topHeartGeo.center(); 
            topHeartGeo.scale(0.42, 0.42, 0.42);
            
            const starMat = new THREE.MeshStandardMaterial({ 
                color: 0xffccd5,

                roughness: 0.1 
            });
            const topHeart = new THREE.Mesh(topHeartGeo, starMat);
            topHeart.position.set(0, 8.5, 0); // Positioned at top center cleft of the heart shape
            mainGroup.add(topHeart);
            
            // Add group for photo meshes
            mainGroup.add(photoMeshGroup);

        function createDust() {

            for (let i = 0; i < CONFIG.particles.dustCount; i++) {

        function addPhotoToScene(texture) {
            // Gold frame with polaroid aspect
            const width = 1.3; 
            const height = 1.6;
            const frameGeo = new THREE.BoxGeometry(width, height, 0.05);
            const frameMat = new THREE.MeshStandardMaterial({ 
                color: CONFIG.colors.roseGold, 
                metalness: 0.85, 
                roughness: 0.15 
            });
            const frame = new THREE.Mesh(frameGeo, frameMat);
            
            // Photo area (shifted slightly up like polaroids)
            const photoGeo = new THREE.PlaneGeometry(width * 0.88, height * 0.74);
            const photoMat = new THREE.MeshBasicMaterial({ 
                map: texture, 
                side: THREE.DoubleSide 
            });
            
            // Front photo plane
            const photoFront = new THREE.Mesh(photoGeo, photoMat);
            photoFront.position.set(0, height * 0.08, 0.026); 
            
            // Back photo plane
            const photoBack = new THREE.Mesh(photoGeo, photoMat);
            photoBack.position.set(0, height * 0.08, -0.026);
            photoBack.rotateY(Math.PI); // Rotate 180 degrees to prevent mirroring and face outwards
            
            const group = new THREE.Group();
            group.add(frame); 
            group.add(photoFront);
            group.add(photoBack);
            
            const s = 0.85; 
            group.scale.set(s, s, s);
            
            photoMeshGroup.add(group);
            particleSystem.push(new Particle(group, 'PHOTO', false));
            updatePhotoLayout();
        }

        function handleImageUpload(e) {
            const files = e.target.files;
            if (!files.length) return;
            const loader = new THREE.TextureLoader();
            Array.from(files).forEach(f => {
                if (!f.type.startsWith('image/')) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    loader.load(ev.target.result, (t) => {
                        t.colorSpace = THREE.SRGBColorSpace;
                        addPhotoToScene(t);
                    });
                };
                reader.readAsDataURL(f);
            });
        }

        async function loadPredefinedImages() {
            const loader = new THREE.TextureLoader();
            
            // Loop through our array of predefined images
            const loadPromises = PREDEFINED_IMAGES.map(fileName => {
                return new Promise((resolve) => {
                    loader.load(fileName, 
                        (t) => {
                            t.colorSpace = THREE.SRGBColorSpace;
                            addPhotoToScene(t);
                            resolve();
                        },
                        undefined,
                        () => {
                            console.warn("Failed to load predefined image:", fileName);
                            resolve(); // resolve anyway to keep moving
                        }
                    );
                });
            });
            
            await Promise.all(loadPromises);
        }

        function setupAudio() {

            const musicBtn = document.getElementById('music-btn');
            const musicUpload = document.getElementById('music-upload');

            musicBtn.addEventListener('click', () => {
                if (audio.paused) {

                    }).catch(err => {
                        console.warn("Audio autoplay blocked:", err);

                    audio.pause();
                    musicBtn.classList.remove('playing');

                }
            });

            musicUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        audio.src = event.target.result;

                            musicBtn.innerHTML = '<i class="fas fa-pause"></i>';
                        });
                    };
                    reader.readAsDataURL(file);

                    musicBtn.innerHTML = '<i class="fas fa-pause"></i>';
                    window.removeEventListener('click', startOnInteraction);
                    window.removeEventListener('touchstart', startOnInteraction);

            window.addEventListener('click', startOnInteraction);
            window.addEventListener('touchstart', startOnInteraction);
        }

        // --- MediaPipe Hand Tracking ---
        async function initMediaPipe() {
            if (isCameraRunning) return;
            camBtn.innerText = "Đang kết nối...";
            debugInfo.innerText = "Đang tải mô hình AI nhận diện...";
            video = document.getElementById('webcam');
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: { 
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`, 
                        delegate: "GPU" 
                    },
                    runningMode: "VIDEO", 
                    numHands: 1
                });
                
                const constraints = { 
                    video: { 
                        facingMode: "user", 
                        width: { ideal: 640 }, 
                        height: { ideal: 480 } 
                    } 
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
                
                document.getElementById('webcam-wrapper').classList.add('active');
                debugInfo.innerText = "Cử chỉ tay hoạt động: Đưa bàn tay lên trước camera";
                camBtn.innerText = "Cử chỉ Hoạt Động";
                camBtn.classList.add('active');
                isCameraRunning = true;
            } catch(e) {
                console.warn("Camera init error:", e);
                let msg = "Lỗi Camera: " + e.name;
                if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') msg = "Hãy cho phép quyền truy cập camera!";
                else if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') msg = "Yêu cầu kết nối HTTPS để dùng Camera!";
                debugInfo.innerText = msg; 
                showMsg(msg);
                camBtn.innerText = "Thử Lại Camera";
            }
        }

        let lastVideoTime = -1;
        async function predictWebcam() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                if (handLandmarker) {
                    const result = handLandmarker.detectForVideo(video, performance.now());
                    processGestures(result);
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        function processGestures(result) {
            if (result.landmarks && result.landmarks.length > 0) {
                STATE.hand.detected = true;
                const lm = result.landmarks[0];
                
                // Track middle MCP joint for palm position
                STATE.hand.x = (lm[9].x - 0.5) * 2; 
                STATE.hand.y = (lm[9].y - 0.5) * 2;
                
                const wrist = lm[0]; 
                const middleMCP = lm[9]; 
                const handSize = Math.hypot(middleMCP.x - wrist.x, middleMCP.y - wrist.y);
                if (handSize < 0.02) return;
                
                // Average distance of finger tips to wrist
                const tips = [lm[8], lm[12], lm[16], lm[20]];
                let avgTipDist = 0; 
                tips.forEach(t => avgTipDist += Math.hypot(t.x - wrist.x, t.y - wrist.y)); 
                avgTipDist /= 4;
                
                const pinchDist = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
                const extensionRatio = avgTipDist / handSize; 
                const pinchRatio = pinchDist / handSize;
                
                if (extensionRatio < 1.48) { 
                    // Clenched fist -> HEART mode
                    if (STATE.mode !== 'TREE') window.setMode('TREE');
                } else if (pinchRatio < 0.32) {
                    // Pinch -> FOCUS mode on a random photo
                    if (STATE.mode !== 'FOCUS') {
                        window.setMode('FOCUS_RANDOM');
                    }
                } else if (extensionRatio > 1.68) { 
                    // Open Palm -> SCATTER mode
                    if (STATE.mode !== 'SCATTER') window.setMode('SCATTER');
                }
            } else {
                STATE.hand.detected = false;
            }
        }

        function setupEvents() {
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });
            
            document.getElementById('file-input').addEventListener('change', handleImageUpload);
            document.getElementById('folder-input').addEventListener('change', handleImageUpload);
            camBtn.addEventListener('click', () => { initMediaPipe(); });
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            
            if (STATE.hand.detected) {
                if (STATE.mode === 'SCATTER') {
                    // Use hand movements to rotate the scattered nebula
                    const targetRotY = STATE.hand.x * Math.PI * 0.8; 
                    const targetRotX = STATE.hand.y * Math.PI * 0.22;
                    STATE.rotation.y += (targetRotY - STATE.rotation.y) * 2.5 * dt;
                    STATE.rotation.x += (targetRotX - STATE.rotation.x) * 2.5 * dt;
                } else {
                    STATE.rotation.y += 0.25 * dt;
                }
            } else if (STATE.touch.active) {
                // Keep touch rotation intact
            } else {
                // Auto rotate
                if (STATE.mode === 'TREE') {
                    STATE.rotation.y += 0.28 * dt;
                    STATE.rotation.x += (0 - STATE.rotation.x) * 1.8 * dt;
                } else {
                    STATE.rotation.y += 0.08 * dt; 
                }
            }
            
            mainGroup.rotation.y = STATE.rotation.y;
            mainGroup.rotation.x = STATE.rotation.x;
            
            particleSystem.forEach(p => p.update(dt, STATE.mode, STATE.focusTarget));
            updateSnow();
            composer.render();
        }

        init();
    </script>
</body>
